services:
  - type: web
    name: ai-news-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python news_agent.py
    envVars:
      - key: NEWS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: CACHE_TTL_SECONDS
        value: "900"
